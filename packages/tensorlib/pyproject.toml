[project]
name = "habemus-papadum-tl"
# Managed by the release workflow (scripts/_versioning.py); between releases it carries a
# "+dev" marker (a PEP 440 local version, which PyPI refuses to upload). Do not hand-edit.
version = "0.0.0+dev"
description = "pdum.tl — the assemblage tensor language: layout algebra, compute primitives, AD, cost semantics"
readme = "README.md"
license = { text = "MIT" }
keywords = []
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
authors = [
    { name = "Nehal Patel", email = "nehal@alum.mit.edu" }
]
requires-python = ">=3.14"
dependencies = [
    # Lockstep-pinned sibling (200 §2): scripts/_versioning.py rewrites this
    # constraint alongside every version bump — do not hand-edit.
    "habemus-papadum-dsl==0.0.0+dev",
    "numpy>=2.5.0",
]

[tool.uv.sources]
habemus-papadum-dsl = { workspace = true }

[project.urls]
Homepage = "https://github.com/habemus-papadum/pdum_dsl"
Repository = "https://github.com/habemus-papadum/pdum_dsl"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# pdum is a PEP 420 implicit namespace package (no src/pdum/__init__.py), shared with the
# sibling habemus-papadum-* distributions. Don't add pdum/__init__.py.
packages = ["src/pdum"]
