site_name: habemus-papadum-dsl
site_description: A Python DSL compiler framework (numba-like workflow, Julia-like type-keyed caching)
site_author: Nehal Patel
repo_url: https://github.com/habemus-papadum/pdum_dsl
repo_name: pdum_dsl

theme:
  name: "material"
  palette:
    primary: blue grey
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - User Guides:
      - WebGPU Shaders: guide/webgpu-shaders.md
      - Designing a DSL: guide/designing-a-dsl.md
  - Theory & Internals:
      - Overview & Timing: theory/overview.md
      - Caching & Generations: theory/caching.md
      - Type System: theory/type-system.md
      - WGSL Backend & Runtime: theory/wgsl-backend.md
  - API Reference:
      - Core: reference/core.md
      - Frontend & Passes: reference/frontend.md
      - WGSL Backend: reference/wgsl.md
      - WebGPU Runtime: reference/runtime.md

docs_dir: docs

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_submodules: true
            show_source: true
            show_root_heading: true
            heading_level: 2
            members_order: source
            separate_signature: true
            show_signature_annotations: true
