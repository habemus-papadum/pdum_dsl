site_name: habemus-papadum-dsl
site_description: A Python DSL compiler framework (numba-like workflow, Julia-like type-keyed caching)
site_author: Nehal Patel
repo_url: https://github.com/habemus-papadum/pdum_dsl
repo_name: pdum_dsl

theme:
  name: "material"
  palette:
    primary: blue grey
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Desiderata: desiderata.md
  - The Book:
      - "Chapter 0 — The thesis": book/ch00-thesis.ipynb
      - "Chapter 1 — Types are values": book/ch01-types-are-values.ipynb
      - "Chapter 2 — What a closure is": book/ch02-what-a-closure-is.ipynb
      - "Chapter 3 — One compile per signature": book/ch03-one-compile-per-signature.ipynb
      - "Chapter 4 — Pipelines are values": book/ch04-pipelines-are-values.ipynb
      - "Chapter 5 — Programs are values": book/ch05-programs-are-values.ipynb
      - Glossary: book/GLOSSARY.md
  - M0 reference asset (frozen):
      - Overview: m0/index.md
      - User Guides:
          - WebGPU Shaders: m0/guide/webgpu-shaders.md
          - Designing a DSL: m0/guide/designing-a-dsl.md
      - Theory & Internals:
          - Overview & Timing: m0/theory/overview.md
          - Caching & Generations: m0/theory/caching.md
          - Type System: m0/theory/type-system.md
          - WGSL Backend & Runtime: m0/theory/wgsl-backend.md
      - API Reference:
          - Core: m0/reference/core.md
          - Frontend & Passes: m0/reference/frontend.md
          - WGSL Backend: m0/reference/wgsl.md
          - WebGPU Runtime: m0/reference/runtime.md

docs_dir: docs

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search
  - mkdocs-jupyter:
      execute: false  # execution is the notebook harness's job (scripts/test_notebooks.sh)
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_submodules: true
            show_source: true
            show_root_heading: true
            heading_level: 2
            members_order: source
            separate_signature: true
            show_signature_annotations: true
