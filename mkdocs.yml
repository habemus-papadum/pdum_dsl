site_name: pdum workspace
site_description: "pdum.dsl + pdum.tl: type-keyed DSL compiler infrastructure and the assemblage tensor language"
site_author: Nehal Patel
repo_url: https://github.com/habemus-papadum/pdum_dsl
repo_name: pdum_dsl

theme:
  name: "material"
  palette:
    primary: blue grey
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - "The spec (200)": design/200_the-spec.md
  - "Backend notes (210)": design/210_backend-notes.md
  - Design: design/README.md

docs_dir: docs
exclude_docs: |
  design/history/

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search
